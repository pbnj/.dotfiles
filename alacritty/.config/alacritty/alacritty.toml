# https://alacritty.org/config-alacritty.html
[general]
live_config_reload = true
import = [
  "~/.local/share/nvim/site/pack/core/opt/tokyonight.nvim/extras/alacritty/tokyonight_moon.toml",
]

[env]
# TERM = "xterm-256color"

[window]
decorations = "Buttonless"
dynamic_padding = true
option_as_alt = "OnlyLeft"
opacity = 1.0
blur = false

[font]
size = 15
normal.family = "IoskeleyMonoTerm Nerd Font"
normal.style = "Light"

[selection]
save_to_clipboard = true
