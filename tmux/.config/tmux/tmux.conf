# SENSIBLE

set-option -g automatic-rename on
set-option -g automatic-rename-format "#(~/.config/tmux/scripts/git-cwd.sh '#{pane_current_path}')"
set-option -g base-index 1
set-option -g default-command "${SHELL}"
set-option -g default-terminal 'xterm-256color'
set-option -g history-limit 20000
set-option -g mode-keys vi
set-option -g mouse on
set-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g set-clipboard on
set-option -g status on
set-option -g status-interval 1
set-option -g status-position top
set-option -g status-left ""
set-option -g status-left-length 0
set-option -g status-right ""
set-option -g status-right-length 0
set-option -g status-style bg=default
set-option -g terminal-features ',*:RGB'
set-option -g visual-activity off
set-option -g wrap-search off
set-option -ga terminal-overrides ',*:enacs@:smacs@:rmacs@:acsc@'
set-option -gq allow-passthrough on
set-option -gw window-status-current-style bg=default,bold
set-option -s escape-time 0
set-option -s extended-keys on
set-option -g extended-keys-format csi-u # for pi

if-shell '[[ $(uname -s) == Darwin ]]' { set -s copy-command 'pbcopy' }

###############################################################################
# KEYBINDINGS
###############################################################################

## Create 'w' chain for work keybinds
bind-key w switch-client -T work
bind-key -T work a new-window -- nvim -c 'lua Snacks.picker.aws_console()'
bind-key -T work o new-window -- nvim -c 'lua Snacks.picker.okta_apps()'

## Quick scroll/copy mode entry
bind-key Space copy-mode

## productivity
bind-key C-] run-shell ${HOME}/.local/bin/tmux-scrollback
bind-key C-f new-window -c ${HOME}/Projects -- nvim -c 'lua Snacks.picker.files({ cwd = "~/Projects" })'
bind-key C-g new-window -c ${HOME}/Projects -- nvim -c 'lua Snacks.picker.grep({ title = "Grep (all projects)", dirs = { "~/Projects/" }, layout = { fullscreen = true } })'

## Smooth scrolling with mouse wheel (already enabled with 'mouse on')
## Use Shift+PageUp/PageDown for history outside copy mode
bind-key -n S-PageUp copy-mode -u
bind-key -n S-PageDown copy-mode -u

## Copy/scroll mode navigation
bind-key -T copy-mode Escape send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection

## Vi keys for history scrolling in copy mode
bind-key -T copy-mode-vi j send -X cursor-down
bind-key -T copy-mode-vi k send -X cursor-up
bind-key -T copy-mode-vi h send -X cursor-left
bind-key -T copy-mode-vi l send -X cursor-right
bind-key -T copy-mode-vi '/' send -X search-forward
bind-key -T copy-mode-vi '?' send -X search-backward
bind-key -T copy-mode-vi n send -X search-again
bind-key -T copy-mode-vi N send -X search-reverse
bind-key -T copy-mode-vi g send -X history-top
bind-key -T copy-mode-vi G send -X history-bottom
bind-key -T copy-mode-vi C-d send -X halfpage-down
bind-key -T copy-mode-vi C-u send -X halfpage-up
bind-key -T copy-mode-vi C-f send -X page-down
bind-key -T copy-mode-vi C-b send -X page-up

## Prompt navigation in copy mode
bind-key -T copy-mode-vi '[' send -X previous-prompt
bind-key -T copy-mode-vi ']' send -X next-prompt

## Command history navigation (edit mode)
bind-key -T edit-mode-vi Down send-keys -X history-down
bind-key -T edit-mode-vi Up send-keys -X history-up

## Quick access to prompt/history
bind-key Enter {
  copy-mode ;
  send-keys -X previous-prompt ;
  send-keys -X select-line ;
  send-keys -X next-prompt ;
}

## from: https://github.com/tmux-plugins/tmux-pain-control/blob/master/pain_control.tmux
### Window nav
bind-key '<' swap-window -t -1
bind-key '>' swap-window -t +1
bind-key C-n select-window -n
bind-key C-p select-window -p

## Spliting windows
bind-key '%' split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

## Panes nav
bind-key  C-h  select-pane  -L
bind-key  C-j  select-pane  -D
bind-key  C-k  select-pane  -U
bind-key  C-l  select-pane  -R
bind-key  H    join-pane    -h  -t  !

unbind C-o
bind-key C-o select-pane -t+
